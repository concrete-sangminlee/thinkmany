<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 — 승원이 연구 가이드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
  <style>
    :root {
      --bg: #0a0a0f; --bg2: #111118; --bg3: #16161f;
      --text: #e8e8ed; --text2: #9898a8; --muted: #6a6a7a;
      --border: #2a2a3a; --purple: #a78bfa; --blue: #6366f1;
      --cyan: #22d3ee; --green: #34d399; --red: #f87171; --orange: #fb923c;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Login */
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    #login-screen h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    #login-screen p { color: var(--text2); margin-bottom: 2rem; text-align: center; font-size: 0.9rem; max-width: 400px; }
    #login-screen input { width: 100%; max-width: 400px; padding: 12px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; margin-bottom: 1rem; }
    #login-screen input:focus { outline: none; border-color: var(--purple); }
    .login-btn { padding: 12px 32px; background: linear-gradient(135deg, var(--purple), var(--blue)); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
    #login-error { color: var(--red); margin-top: 1rem; font-size: 0.85rem; display: none; }

    /* App */
    #app { display: none; }
    .app-header { display: flex; align-items: center; justify-content: space-between; padding: 0.8rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--bg2); position: sticky; top: 0; z-index: 100; }
    .app-header h1 { font-size: 1rem; font-weight: 600; }
    .header-actions { display: flex; gap: 0.5rem; align-items: center; }

    .btn { padding: 7px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg3); color: var(--text); font-size: 0.82rem; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
    .btn:hover { border-color: var(--purple); }
    .btn-save { background: linear-gradient(135deg, var(--purple), var(--blue)); border: none; color: white; font-weight: 600; }
    .btn-save:hover { opacity: 0.9; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-danger { border-color: var(--red); color: var(--red); }
    .btn-danger:hover { background: rgba(248,113,113,0.1); }
    .btn-sm { padding: 4px 10px; font-size: 0.75rem; }

    /* Tabs */
    .mode-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--bg2); }
    .mode-tab { padding: 10px 20px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .mode-tab:hover { color: var(--text); }
    .mode-tab.active { color: var(--purple); border-bottom-color: var(--purple); }

    /* Body */
    .app-body { display: flex; height: calc(100vh - 95px); }

    /* File list */
    .file-list { width: 280px; border-right: 1px solid var(--border); overflow-y: auto; background: var(--bg); flex-shrink: 0; }
    .file-group-label { padding: 0.8rem 1rem 0.4rem; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .file-item { display: block; padding: 0.5rem 1rem 0.5rem 1.5rem; font-size: 0.82rem; color: var(--text2); cursor: pointer; border-left: 2px solid transparent; transition: all 0.15s; }
    .file-item:hover { background: rgba(167,139,250,0.05); color: var(--text); }
    .file-item.active { background: rgba(167,139,250,0.08); color: var(--purple); border-left-color: var(--purple); font-weight: 500; }

    /* Editor */
    .editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .editor-header { padding: 0.8rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--bg2); display: flex; align-items: center; justify-content: space-between; }
    .editor-filename { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: var(--cyan); }
    .editor-status { font-size: 0.8rem; color: var(--muted); }
    .editor-status.modified { color: var(--purple); }
    .editor-status.saving { color: var(--cyan); }
    .editor-status.saved { color: var(--green); }
    .editor-status.error { color: var(--red); }
    .editor-wrap { flex: 1; overflow: auto; }
    .no-file { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 0.95rem; }

    /* TOC Manager */
    #toc-manager { display: none; padding: 2rem; overflow-y: auto; max-width: 800px; margin: 0 auto; }
    .toc-section-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1.5rem; overflow: hidden; }
    .toc-section-header { display: flex; align-items: center; gap: 0.8rem; padding: 1rem 1.2rem; background: var(--bg3); border-bottom: 1px solid var(--border); }
    .toc-section-header input { flex: 1; padding: 6px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem; }
    .toc-section-header input:focus { outline: none; border-color: var(--purple); }
    .toc-section-header select { padding: 6px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.8rem; }
    .color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .toc-sub-list { padding: 0.5rem 0; }
    .toc-sub-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 1.2rem; }
    .toc-sub-item input { flex: 1; padding: 5px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.85rem; }
    .toc-sub-item input:focus { outline: none; border-color: var(--purple); }
    .toc-sub-actions { display: flex; gap: 4px; }
    .toc-add-sub { padding: 0.5rem 1.2rem; }
    .toc-add-sub button { padding: 5px 12px; font-size: 0.8rem; background: none; border: 1px dashed var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
    .toc-add-sub button:hover { border-color: var(--purple); color: var(--purple); }
    .icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 4px; border-radius: 4px; transition: all 0.15s; line-height: 1; }
    .icon-btn:hover { color: var(--text); background: var(--bg3); }
    .icon-btn.delete:hover { color: var(--red); }
    #add-section-btn { display: block; width: 100%; padding: 12px; background: none; border: 2px dashed var(--border); border-radius: var(--radius); color: var(--muted); font-size: 0.9rem; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; margin-bottom: 1rem; }
    #add-section-btn:hover { border-color: var(--purple); color: var(--purple); }
    #save-toc-btn { display: block; width: 100%; margin-top: 1rem; }

    /* EasyMDE */
    .EasyMDEContainer { height: 100%; }
    .EasyMDEContainer .CodeMirror { background: var(--bg) !important; color: var(--text) !important; border: none !important; font-family: 'JetBrains Mono', monospace !important; font-size: 0.9rem !important; height: 100% !important; }
    .EasyMDEContainer .CodeMirror-cursor { border-left-color: var(--purple) !important; }
    .EasyMDEContainer .CodeMirror-selected { background: rgba(167,139,250,0.2) !important; }
    .EasyMDEContainer .editor-toolbar { background: var(--bg2) !important; border-bottom: 1px solid var(--border) !important; border-top: none !important; opacity: 1 !important; }
    .EasyMDEContainer .editor-toolbar button { color: var(--text2) !important; }
    .EasyMDEContainer .editor-toolbar button:hover, .EasyMDEContainer .editor-toolbar button.active { background: var(--bg3) !important; color: var(--purple) !important; border-color: var(--border) !important; }
    .EasyMDEContainer .editor-statusbar { display: none !important; }
    .EasyMDEContainer .editor-preview { background: var(--bg) !important; color: var(--text) !important; font-family: 'Inter', sans-serif !important; }
    .EasyMDEContainer .editor-preview h1, .EasyMDEContainer .editor-preview h2, .EasyMDEContainer .editor-preview h3 { color: white !important; }
    .EasyMDEContainer .editor-preview code { background: var(--bg3) !important; color: var(--cyan) !important; }

    /* Toast */
    .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 12px 20px; border-radius: 8px; font-size: 0.9rem; font-weight: 500; z-index: 999; animation: slideUp 0.3s ease; }
    .toast.success { background: rgba(52,211,153,0.15); border: 1px solid rgba(52,211,153,0.3); color: var(--green); }
    .toast.error { background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    @media (max-width: 768px) {
      .file-list { width: 200px; }
      #toc-manager { padding: 1rem; }
    }
    @media (max-width: 480px) {
      .app-body { flex-direction: column; }
      .file-list { width: 100%; height: 180px; border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-screen">
    <h1>관리자 로그인</h1>
    <p>GitHub Personal Access Token을 입력하세요.<br>
       토큰은 브라우저에만 저장됩니다.<br>
       <a href="https://github.com/settings/tokens/new" target="_blank" style="color:#a78bfa;">토큰 발급하기</a> (repo 권한 필요)</p>
    <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    <button class="login-btn" id="login-btn">로그인</button>
    <div id="login-error"></div>
  </div>

  <!-- App -->
  <div id="app">
    <div class="app-header">
      <h1>관리자</h1>
      <div class="header-actions">
        <button class="btn btn-save" id="save-btn" disabled>저장 (Ctrl+S)</button>
        <button class="btn" onclick="location.href='../'">사이트 보기</button>
        <button class="btn btn-danger" id="logout-btn">로그아웃</button>
      </div>
    </div>

    <!-- Mode tabs -->
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="editor">글 작성</button>
      <button class="mode-tab" data-mode="toc">목차 관리</button>
    </div>

    <!-- Editor mode -->
    <div class="app-body" id="editor-mode">
      <div class="file-list" id="file-list"></div>
      <div class="editor-area">
        <div class="editor-header" id="editor-header" style="display:none;">
          <span class="editor-filename" id="editor-filename"></span>
          <span class="editor-status" id="editor-status"></span>
        </div>
        <div class="editor-wrap" id="editor-wrap">
          <div class="no-file" id="no-file">왼쪽에서 파일을 선택하세요</div>
          <textarea id="editor-textarea" style="display:none;"></textarea>
        </div>
      </div>
    </div>

    <!-- TOC manager mode -->
    <div id="toc-manager">
      <div id="toc-sections"></div>
      <button id="add-section-btn">+ 새 섹션 추가</button>
      <button class="btn btn-save" id="save-toc-btn" style="width:100%;">목차 저장</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
  <script>
    const REPO_OWNER = 'concrete-sangminlee';
    const REPO_NAME = 'seungwon_thinkmany';
    const CONTENT_DIR = 'content';
    const COLORS = ['purple','blue','cyan','green','orange','pink'];
    const COLOR_HEX = { purple:'#a78bfa', blue:'#6366f1', cyan:'#22d3ee', green:'#34d399', orange:'#fb923c', pink:'#f472b6' };

    let token = '';
    let config = null;
    let configSha = null;
    let currentFile = null;
    let currentSha = null;
    let originalContent = '';
    let editor = null;

    // --- GitHub API ---
    async function ghAPI(path, options = {}) {
      const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/${path}`, {
        ...options,
        headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json', ...options.headers },
      });
      return res;
    }

    async function loadGHFile(filePath) {
      const res = await ghAPI(`contents/${filePath}`);
      if (res.status === 404) return { content: '', sha: null };
      const data = await res.json();
      return { content: decodeURIComponent(escape(atob(data.content.replace(/\n/g, '')))), sha: data.sha };
    }

    async function saveGHFile(filePath, content, sha) {
      const body = { message: `docs: ${filePath} 업데이트`, content: btoa(unescape(encodeURIComponent(content))) };
      if (sha) body.sha = sha;
      const res = await ghAPI(`contents/${filePath}`, { method: 'PUT', body: JSON.stringify(body) });
      const data = await res.json();
      return data.content ? data.content.sha : null;
    }

    // --- Login ---
    document.getElementById('login-btn').addEventListener('click', async () => {
      const t = document.getElementById('token-input').value.trim();
      if (!t) return;
      try {
        const res = await fetch('https://api.github.com/user', { headers: { 'Authorization': `Bearer ${t}` } });
        if (!res.ok) throw new Error('유효하지 않은 토큰');
        const user = await res.json();
        if (user.login !== REPO_OWNER) throw new Error('리포지토리 소유자만 접근 가능');
        token = t;
        localStorage.setItem('sw_admin_token', t);
        await initApp();
      } catch (e) {
        const el = document.getElementById('login-error');
        el.textContent = e.message;
        el.style.display = 'block';
      }
    });

    const savedToken = localStorage.getItem('sw_admin_token');
    if (savedToken) { token = savedToken; initApp(); }

    async function initApp() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      // Load config
      const { content, sha } = await loadGHFile(CONTENT_DIR + '/config.json');
      config = JSON.parse(content);
      configSha = sha;
      renderFileList();
      renderTOCManager();
    }

    // --- Mode Tabs ---
    document.querySelectorAll('.mode-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const mode = tab.getAttribute('data-mode');
        document.getElementById('editor-mode').style.display = mode === 'editor' ? 'flex' : 'none';
        document.getElementById('toc-manager').style.display = mode === 'toc' ? 'block' : 'none';
      });
    });

    // --- File List ---
    function renderFileList() {
      const list = document.getElementById('file-list');
      list.innerHTML = '';
      config.sections.forEach(sec => {
        const label = document.createElement('div');
        label.className = 'file-group-label';
        label.textContent = sec.number + '. ' + sec.title;
        list.appendChild(label);
        sec.subsections.forEach(sub => {
          const item = document.createElement('div');
          item.className = 'file-item';
          item.textContent = sub.title;
          item.setAttribute('data-file', sub.file);
          item.addEventListener('click', () => openFile(sub.file, sub.title, item));
          list.appendChild(item);
        });
      });
    }

    async function openFile(filePath, label, el) {
      if (currentFile && editor && editor.value() !== originalContent) {
        if (!confirm('저장하지 않은 변경사항이 있습니다. 계속할까요?')) return;
      }
      document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      currentFile = filePath;
      document.getElementById('no-file').style.display = 'none';
      document.getElementById('editor-header').style.display = 'flex';
      document.getElementById('editor-filename').textContent = filePath;
      setStatus('불러오는 중...', '');
      try {
        const { content, sha } = await loadGHFile(CONTENT_DIR + '/' + filePath);
        currentSha = sha;
        originalContent = content;
        if (editor) { editor.toTextArea(); editor = null; }
        const ta = document.getElementById('editor-textarea');
        ta.style.display = 'block';
        ta.value = content;
        editor = new EasyMDE({ element: ta, autofocus: true, spellChecker: false, status: false,
          placeholder: '마크다운으로 내용을 작성하세요...',
          toolbar: ['bold','italic','heading','|','unordered-list','ordered-list','|','code','quote','link','image','|','preview','side-by-side','|','guide'],
          sideBySideFullscreen: false,
        });
        editor.codemirror.on('change', () => {
          const mod = editor.value() !== originalContent;
          document.getElementById('save-btn').disabled = !mod;
          setStatus(mod ? '수정됨' : '', mod ? 'modified' : '');
        });
        setStatus('', '');
        document.getElementById('save-btn').disabled = true;
      } catch (e) { setStatus('오류: ' + e.message, 'error'); }
    }

    // --- Save file ---
    document.getElementById('save-btn').addEventListener('click', doSave);
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); if (!document.getElementById('save-btn').disabled) doSave(); }
    });

    async function doSave() {
      if (!currentFile || !editor) return;
      document.getElementById('save-btn').disabled = true;
      setStatus('저장 중...', 'saving');
      try {
        const content = editor.value();
        const newSha = await saveGHFile(CONTENT_DIR + '/' + currentFile, content, currentSha);
        currentSha = newSha;
        originalContent = content;
        setStatus('저장 완료', 'saved');
        showToast('저장되었습니다', 'success');
        setTimeout(() => setStatus('', ''), 3000);
      } catch (e) {
        setStatus('저장 실패', 'error');
        showToast('저장 실패: ' + e.message, 'error');
        document.getElementById('save-btn').disabled = false;
      }
    }

    // --- TOC Manager ---
    function renderTOCManager() {
      const container = document.getElementById('toc-sections');
      container.innerHTML = '';
      config.sections.forEach((sec, si) => {
        const card = document.createElement('div');
        card.className = 'toc-section-card';
        card.innerHTML = `
          <div class="toc-section-header">
            <span class="color-dot" style="background:${COLOR_HEX[sec.color]||'#a78bfa'}"></span>
            <input type="text" value="${sec.title}" data-field="title" data-si="${si}" placeholder="섹션 제목">
            <select data-field="color" data-si="${si}">${COLORS.map(c=>`<option value="${c}"${c===sec.color?' selected':''}>${c}</option>`).join('')}</select>
            <button class="icon-btn" title="위로" onclick="moveSection(${si},-1)">↑</button>
            <button class="icon-btn" title="아래로" onclick="moveSection(${si},1)">↓</button>
            <button class="icon-btn delete" title="섹션 삭제" onclick="deleteSection(${si})">✕</button>
          </div>
          <div class="toc-sub-list" id="sub-list-${si}">
            ${sec.subsections.map((sub, ssi) => `
              <div class="toc-sub-item">
                <input type="text" value="${sub.title}" data-field="sub-title" data-si="${si}" data-ssi="${ssi}" placeholder="소제목">
                <div class="toc-sub-actions">
                  <button class="icon-btn" title="위로" onclick="moveSub(${si},${ssi},-1)">↑</button>
                  <button class="icon-btn" title="아래로" onclick="moveSub(${si},${ssi},1)">↓</button>
                  <button class="icon-btn delete" title="삭제" onclick="deleteSub(${si},${ssi})">✕</button>
                </div>
              </div>
            `).join('')}
          </div>
          <div class="toc-add-sub">
            <button onclick="addSub(${si})">+ 하위 항목 추가</button>
          </div>
        `;
        container.appendChild(card);
      });

      // Sync input changes to config
      container.querySelectorAll('input[data-field]').forEach(input => {
        input.addEventListener('input', () => {
          const si = parseInt(input.dataset.si);
          if (input.dataset.field === 'title') {
            config.sections[si].title = input.value;
          } else if (input.dataset.field === 'sub-title') {
            const ssi = parseInt(input.dataset.ssi);
            config.sections[si].subsections[ssi].title = input.value;
          }
        });
      });
      container.querySelectorAll('select[data-field="color"]').forEach(sel => {
        sel.addEventListener('change', () => {
          const si = parseInt(sel.dataset.si);
          config.sections[si].color = sel.value;
          renderTOCManager();
        });
      });
    }

    function renumberSections() {
      config.sections.forEach((sec, i) => {
        sec.number = String(i + 1).padStart(2, '0');
        sec.subsections.forEach((sub, j) => {
          const prefix = `${i+1}-${j+1}`;
          sub.id = sub.id || prefix;
          if (!sub.file) sub.file = `${prefix}-${sub.title.replace(/[^a-zA-Z0-9가-힣]/g,'-').toLowerCase()}.md`;
        });
      });
    }

    window.addSub = function(si) {
      const secNum = si + 1;
      const subNum = config.sections[si].subsections.length + 1;
      const id = `${secNum}-${subNum}-new`;
      config.sections[si].subsections.push({ id, file: `${secNum}-${subNum}-new.md`, title: `${secNum}.${subNum} 새 항목` });
      renderTOCManager();
    };

    window.deleteSub = function(si, ssi) {
      if (!confirm(`"${config.sections[si].subsections[ssi].title}" 항목을 삭제할까요?`)) return;
      config.sections[si].subsections.splice(ssi, 1);
      renderTOCManager();
    };

    window.moveSub = function(si, ssi, dir) {
      const arr = config.sections[si].subsections;
      const target = ssi + dir;
      if (target < 0 || target >= arr.length) return;
      [arr[ssi], arr[target]] = [arr[target], arr[ssi]];
      renderTOCManager();
    };

    window.deleteSection = function(si) {
      if (!confirm(`"${config.sections[si].title}" 섹션 전체를 삭제할까요?`)) return;
      config.sections.splice(si, 1);
      renumberSections();
      renderTOCManager();
    };

    window.moveSection = function(si, dir) {
      const target = si + dir;
      if (target < 0 || target >= config.sections.length) return;
      [config.sections[si], config.sections[target]] = [config.sections[target], config.sections[si]];
      renumberSections();
      renderTOCManager();
    };

    document.getElementById('add-section-btn').addEventListener('click', () => {
      const num = config.sections.length + 1;
      config.sections.push({
        id: `section-${num}`,
        number: String(num).padStart(2, '0'),
        title: '새 섹션',
        color: COLORS[(num - 1) % COLORS.length],
        desc: '',
        subsections: []
      });
      renderTOCManager();
    });

    // Save TOC
    document.getElementById('save-toc-btn').addEventListener('click', async () => {
      const btn = document.getElementById('save-toc-btn');
      btn.disabled = true;
      btn.textContent = '저장 중...';
      try {
        renumberSections();
        // Create any new .md files that don't exist
        for (const sec of config.sections) {
          for (const sub of sec.subsections) {
            try {
              const res = await ghAPI(`contents/${CONTENT_DIR}/${sub.file}`);
              if (res.status === 404) {
                await saveGHFile(CONTENT_DIR + '/' + sub.file, '', null);
              }
            } catch(e) {}
          }
        }
        // Save config.json
        const newSha = await saveGHFile(CONTENT_DIR + '/config.json', JSON.stringify(config, null, 2), configSha);
        configSha = newSha;
        renderFileList();
        showToast('목차가 저장되었습니다', 'success');
      } catch (e) {
        showToast('목차 저장 실패: ' + e.message, 'error');
      }
      btn.disabled = false;
      btn.textContent = '목차 저장';
    });

    // --- Logout ---
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('sw_admin_token');
      location.reload();
    });

    // --- Helpers ---
    function setStatus(text, cls) {
      const el = document.getElementById('editor-status');
      el.textContent = text;
      el.className = 'editor-status' + (cls ? ' ' + cls : '');
    }

    function showToast(msg, type) {
      const t = document.createElement('div');
      t.className = 'toast ' + type;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }
  </script>
</body>
</html>
